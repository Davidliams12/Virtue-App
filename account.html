<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Virtue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --accent: #f68b1e;
            --bg-deep: #05070a;
            --card-bg: #11141b;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); }

        /* --- Profile Header --- */
        .account-header {
            background: #000;
            padding: 30px 5%;
            border-bottom: 1px solid var(--border);
        }
        .user-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar-circle { 
            width: 50px; height: 50px; background: var(--gold); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: #000; font-weight: 900; font-size: 1.2rem;
        }
        .user-details h2 { font-size: 1.1rem; color: var(--gold); }
        .user-details p { font-size: 0.85rem; color: var(--text-dim); }

        /* --- Wallet Banner --- */
        .wallet-banner {
            background: var(--accent);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #000;
            font-weight: 700;
            margin-top: 10px;
        }
        .wallet-banner span { font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }

        /* --- Menu Sections --- */
        .menu-section { margin-top: 10px; }
        .section-title { 
            padding: 15px 5%; font-size: 0.75rem; 
            text-transform: uppercase; color: var(--text-dim); 
            letter-spacing: 1px; background: #0a0c10;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 18px 5%;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text-main);
            transition: 0.2s;
        }
        .menu-item:active { background: #1a1f29; }
        .menu-item i:first-child { width: 30px; color: var(--gold); font-size: 1.1rem; }
        .menu-item span { flex: 1; font-size: 0.95rem; }
        .menu-item i:last-child { color: var(--text-dim); font-size: 0.8rem; }

        .logout-btn { color: #ef4444 !important; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="account-header">
        <div class="user-profile">
            <div class="avatar-circle" id="user-initial">V</div>
            <div class="user-details">
                <h2 id="display-name">Welcome, Guest</h2>
                <p id="display-email">Sign in to manage orders</p>
            </div>
        </div>

        <div class="wallet-banner">
            <span><i class="fas fa-wallet"></i> Virtue store credit balance</span>
            <span id="user-balance">₦ 0</span>
        </div>
    </div>

    <div class="menu-section">
        <div class="section-title">My Virtue Account</div>
         <a href="notifications.html" class="menu-item">
            <i class="fas fa-bell"></i>
            <span>Notifications</span>
            <i class="fas fa-chevron-right"></i>
        </a>
         <a href="transaction history.html" class="menu-item">
            <i class="fas fa-envelope"></i>
            <span>Transactions history</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="booked.html" class="menu-item">
            <i class="fas fa-box"></i>
            <span>Orders</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        
           <a href="contact.html" class="menu-item">
            <i class="fas fa-phone"></i>
            <span>Contact us</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        
        <a href="payment.html" class="menu-item">
            <i class="fas fa-university"></i>
            <span>Payments</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        
        <a href="#" class="menu-item">
            <i class="fas fa-envelope"></i>
            <span>Inbox</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="about.html" class="menu-item">
            <i class="fas fa-info"></i>
            <span>About</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="profile.html" class="menu-item">
            <i class="fas fa-user"></i>
            <span>Update profile</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        
    </div>

    <div class="menu-section">
        <div class="section-title">Account Settings</div>
        <a href="settings.html" class="menu-item">
    <i class="fas fa-user-cog"></i>
    <span>Settings & Privacy</span>
    <i class="fas fa-chevron-right"></i>
</a>

        <a href="#" class="menu-item">
            <i class="fas fa-user-cog"></i>
            <span>Account Management</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="privacy.html" class="menu-item">
            <i class="fas fa-shield-alt"></i>
            <span>Privacy & Security</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="javascript:void(0)" class="menu-item logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout / Clear Data</span>
            <i class="fas fa-chevron-right"></i>
        </a>
    </div>

    <script>
        window.onload = function() {
            // Fetch data from virtue_user_data object as saved in checkout.html
            const userData = JSON.parse(localStorage.getItem("virtue_user_data")) || {};
            
            if(userData.name) {
                document.getElementById('display-name').innerText = "Welcome, " + userData.name.split(' ')[0];
                document.getElementById('display-email').innerText = userData.email || "";
                document.getElementById('user-initial').innerText = userData.name.charAt(0).toUpperCase();
            }
        };

        function logout() {
            if(confirm("This will clear your local profile and cart. Continue?")) {
                localStorage.removeItem("virtue_user_data");
                localStorage.removeItem("virtue_cart");
                localStorage.removeItem("virtue_booked");
                location.reload();
            }
        }
    </script>
</body>
</html>
