<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Virtue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: #11141b; --text: #e2e8f0; --border: #1e293b; }
        body.light-mode { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        
        body { background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        header { padding: 20px 5%; background: #000; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        header i { color: var(--gold); cursor: pointer; }

        .container { padding: 20px 5%; }
        .setting-group { background: var(--card); border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid var(--border); }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; margin-top: 10px; font-weight: 700; cursor: pointer; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    </style>
</head>
<body id="body-tag">
    <header>
        <i class="fas fa-arrow-left" onclick="location.href='account.html'"></i>
        <h1 style="font-size: 1.1rem; color: #fff;">Settings</h1>
    </header>

    <div class="container">
        <h3>App Preferences</h3>
        <div class="setting-group">
            <div class="setting-item">
                <span>Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle" onclick="toggleTheme()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <h3>Security & Profile</h3>
        <div class="setting-group">
            <div class="setting-item" onclick="alert('Password reset link sent to your email!')">
                <span>Reset Password</span>
                <i class="fas fa-chevron-right" style="font-size: 0.8rem;"></i>
            </div>
            <div class="setting-item" onclick="location.href='checkout.html'">
                <span>Update Delivery Profile</span>
                <i class="fas fa-chevron-right" style="font-size: 0.8rem;"></i>
            </div>
        </div>

        <button class="btn btn-outline" onclick="clearStorage()">Clear Cache / Reset App</button>
    </div>

    <script>
        function toggleTheme() {
            const isDark = document.getElementById('theme-toggle').checked;
            localStorage.setItem('virtue_theme', isDark ? 'dark' : 'light');
            applyTheme();
        }

        function applyTheme() {
            const theme = localStorage.getItem('virtue_theme') || 'dark';
            if(theme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-toggle').checked = false;
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('theme-toggle').checked = true;
            }
        }

        function clearStorage() {
            if(confirm("Clear all locally stored data?")) {
                localStorage.clear();
                location.reload();
            }
        }
        window.onload = applyTheme;
    </script>
</body>
</html>
